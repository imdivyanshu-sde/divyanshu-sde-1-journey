<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trip to LONDON</title>
</head>
<body>
    <header>
        <h1>TRIP TO LONDON</h1>
    </header>
    <main>
        <form>
            <div>
            <label for="name">name</label>
            <input id="name" type="text" placeholder="enter name" required>
            </div>
<div>
    <label for="gmail">gmail</label>
    <input id="gmail" type="gmail" placeholder=" enter gmail" required>
</div>

<div>
    <label for="ph">number</label>
    <input id="ph" type="tel" placeholder="number" required>
</div>
<h3> check the boxes you want to visit</h3>
<div>
    <input id="Buckingham Palace" type="checkbox" name="visit" value="Buckingham Palace">
    <label for="Buckingham Palace">Buckingham Palace</label>
        <input id="ower of London" type="checkbox" name="visit" value="ower of London">
    <label for="Tower of London">Tower of London</label>
    <input id="Big Ben & Houses of Parliament" type="checkbox" name="visit" value="Big Ben & Houses of Parliament">
    <label for="Big Ben & Houses of Parliament">Big Ben & Houses of Parliament</label>
        <input id="London Eye " type="checkbox" name="visit" value="London Eye ">
    <label for="London Eye ">London Eye</label>
        <input id="British Museum" type="checkbox" name="visit" value="British Museum">
    <label for="British Museum">British Museum</label>

</div>
<h3>select total people </h3>
<div>
    <label for="people">people</label>
<select id="people" name="total people" >
    <option value="" disabled selected> select people</option>
    <option value="1">1</option>
<option value="2">2</option>
    <option value="3">3</option>
</select>
</div>
<h3>select gender</h3>
<div>
<input id="male" type="radio" name="gender" value="male">
<label for="male">male</label>
<input id="female" type="radio" name="gender" value="female">
<label for="female">female</label>
<input id="other" type="radio" name="gender" value="other">
<label for="other">other</label>   
</div>
<span>
    <button type="reset">reset</button>
</span>
<span>
    <button type="submit">submit</button>
</span>
        </form>
    </main>
</body>
</html>
